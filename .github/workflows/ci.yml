name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dnd_forge_test
          POSTGRES_USER: dnd_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dnd_user -d dnd_forge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check for missing migrations
        working-directory: backend
        env:
          DB_NAME: dnd_forge_test
          DB_USER: dnd_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: '5432'
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        working-directory: backend
        env:
          DB_NAME: dnd_forge_test
          DB_USER: dnd_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: '5432'
        run: python manage.py migrate --noinput

      - name: Run backend tests
        working-directory: backend
        env:
          DB_NAME: dnd_forge_test
          DB_USER: dnd_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: '5432'
          DJANGO_DEBUG: 'True'
          DJANGO_SECRET_KEY: 'ci-test-secret-key-not-for-production'
        run: python -m pytest -v --cov --cov-report=term-missing

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal env file for build
        run: |
          echo "DJANGO_SECRET_KEY=ci-build-test-key" > .env
          echo "DB_PASSWORD=ci-build-test-password" >> .env
          echo "DJANGO_ALLOWED_HOSTS=localhost" >> .env

      - name: Build production Docker images
        run: docker compose -f docker-compose.prod.yml build
