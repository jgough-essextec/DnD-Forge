# Production Docker Compose configuration
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-dnd_forge}
      POSTGRES_USER: ${DB_USER:-dnd_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dnd_user} -d ${DB_NAME:-dnd_forge}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    # No exposed ports in production -- only accessible from within the Docker network

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
      DB_NAME: ${DB_NAME:-dnd_forge}
      DB_USER: ${DB_USER:-dnd_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: postgres
      DB_PORT: '5432'
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - '${PORT:-80}:80'
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/static:ro
    depends_on:
      - django
    restart: always

volumes:
  postgres_data:
  static_files:
