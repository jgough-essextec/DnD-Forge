services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dnd_forge
      POSTGRES_USER: dnd_user
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dnd_user -d dnd_forge']
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: dnd_forge
      DB_USER: dnd_user
      DB_PASSWORD: changeme
      DB_HOST: postgres
      DB_PORT: '5432'
      DJANGO_DEBUG: 'True'
      DJANGO_SECRET_KEY: 'django-insecure-dev-only-change-in-production'
      DJANGO_ALLOWED_HOSTS: 'localhost,127.0.0.1,django'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: 'http://localhost/api'
    depends_on:
      - django

  nginx:
    image: nginx:1.25-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django
      - react
    restart: unless-stopped

volumes:
  postgres_data:
